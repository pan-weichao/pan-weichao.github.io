{% assign news_by_year = site.news | sort: "date" | reverse | group_by_exp: "item", "item.date | date: '%Y'" %}

<div class="card my-3">
  <div class="card-body">
    <h5 class="card-title mb-3">
      <span class="lang-en">News</span><span class="lang-zh">动态</span>
    </h5>

    {% for year in news_by_year %}
    <div class="row border-top pt-3 mt-3">
      <div class="col-md-1 col-12 text-muted font-weight-bold">
        {{ year.name }}
      </div>

      <div class="col-md-11 col-12">
        {% for item in year.items %}
        <div class="row mb-2">
          <div class="col-md-10 col-12">
            {{ item.title }}
          </div>
          <div class="col-md-2 col-12 text-md-right text-muted font-italic">
            {{ item.date | date: "%b %d" }}
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
