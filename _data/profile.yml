short_bio: >-
  <div class="lang-en">
    <p>
      I recently received my B.Eng. in Artificial Intelligence from the School of Computer Science and Artificial Intelligence,
      Shandong Jianzhu University. During my undergraduate studies, I was advised by Prof. Xingbo Liu.
    </p>
    <p>
      My research focuses on computer vision and machine learning, with particular interests in efficient neural networks,
      medical image analysis, object detection, fault diagnosis, transfer learning, and model reliability.
      I am also exploring embodied artificial intelligence and AI for science.
    </p>
    <p>
      I welcome research discussions and collaborations. Please feel free to contact me by email.
    </p>
  </div>
  <div class="lang-zh">
    <p>
      我本科毕业于山东建筑大学计算机与人工智能学院人工智能专业，本科期间由刘兴波教授指导。
    </p>
    <p>
      我的研究聚焦计算机视觉与机器学习，主要关注高效神经网络、医学图像分析、目标检测、故障诊断、
      迁移学习与模型可靠性，同时也在探索具身智能和人工智能赋能科学研究。
    </p>
    <p>
      欢迎就相关研究与合作进行交流，您可以通过电子邮件与我联系。
    </p>
  </div>

